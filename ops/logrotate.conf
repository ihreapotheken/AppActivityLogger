# /etc/logrotate.d/report-service
#
# The report-service logs to journald by default. This rotation config is
# defensive: it handles any *.log files the service (or an admin) writes
# to /var/log/report-service directly. If you never see files appear in
# that directory, this rule will simply do nothing thanks to `missingok`
# and `notifempty`.
#
# Install with:
#   sudo install -m 0644 logrotate.conf /etc/logrotate.d/report-service

/var/log/report-service/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    create 0640 report-service report-service
    su report-service report-service
}
